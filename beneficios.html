<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ===== MAIN CONTAINER ===== */
.container {
    background-color: #ffffff;
    width: 80%;
    margin: auto;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
    flex-wrap: wrap;
    text-align: center;
}

header h1 {
    flex: 1;
    background-color: #ff0000;
    color: #000;
    margin: 0;
    font-size: 50px;
    padding: 10px;
}

.logo {
    width: 100px;
    margin: 10px;
}

/* ===== NAV BUTTONS ===== */
.nav-btn {
    display: inline-block;
    margin: 20px 75px;
    padding: 10px 30px;
    font-size: 18px;
    background-color: #ff0000;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.nav-btn:hover {
    background-color: #cc0000;
}

/* ===== BLACK BAR ===== */
.black-bar {
    background-color: black;
    height: 40px;
    width: 100%;
}

/* ===== MAIN SECTION ===== */
.main-section {
    position: relative;
    padding: 40px 0;
}

.side-bar {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 250px;
    background-color: red;
}

.side-bar.left { left: 0; }
.side-bar.right { right: 0; }

/* ===== CONTENT ===== */
.content {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    padding: 20px;
}

.section-title {
    font-size: 40px;
    margin: 0;
}
h3{
    padding-left: 20px;
}

ul {
    padding-right: 220px;
    font-size: 20px;
    max-width: 400px;
}

li {
    margin-bottom: 30px;
}

/* IMAGE */
.main-img {
    width: 500px;
    max-width: 100%;
    border-radius: 10px;
}

/* ===== FOOTER ===== */
.footer-content {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
}

.rogelio {
    width: 100px;
}

.social {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.social a {
    color: black;
    text-decoration: none;
}

/* =========================
   📱 MOBILE RESPONSIVE
========================= */
@media (max-width: 768px) {

    .container {
        width: 100%;
    }

    header h1 {
        font-size: 28px;
    }

    .logo {
        width: 70px;
    }

    .nav-btn {
        display: block;
        margin: 10px auto;
        text-align: center;
        width: 80%;
    }

    .content {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .section-title {
        font-size: 28px;
    }

    ul {
        padding: 0;
        list-style-position: inside;
    }

    .side-bar {
        display: none;
    }

    .main-img {
        width: 90%;
    }

    .footer-content {
        flex-direction: column;
        text-align: center;
    }

    .social {
        flex-direction: column;
        gap: 10px;
    }
}

</style>

<title>Banda UPR Ponce</title>
</head>

<body>

<div class="container">

<header>
    <img src="images/Siglas-UPR-Ponce-black.png" class="logo">
    <h1>Banda UPR Ponce</h1>
    <img src="images/ponce-sello.png" class="logo">
</header>

<div class="black-bar"></div>

<a href="sobre.html" class="nav-btn">Sobre Nosotros</a>
<a href="beneficios.html" class="nav-btn">Beneficios</a>
<a href="Instrumentos.html" class="nav-btn">Instrumentos</a>
<a href="Requisitos.html" class="nav-btn">Requisitos</a>
<a href="Galeria.html" class="nav-btn">Galeria</a>

<main>
    <div class="main-section">

        <div class="side-bar left"></div>
        <div class="side-bar right"></div>

        <div class="content">

            <div>
                <h3 class="section-title">Beneficios</h3>

                <ul>
                    <li>$800 al semestre</li>
                    <li>matricula adelantada</li>
                    <li>oportunidad de viajar</li>
                </ul>
            </div>

            <img src="images/Foto-sobre-nosotros.jpg" class="main-img">

        </div>
    </div>
</main>

<footer class="footer">
    <hr>

    <div class="footer-content">
        <img src="images/rogelio.png" class="rogelio">

        <div class="social">
            <p>Instagram: <a href="https://www.instagram.com/banda_uprponce/">banda_uprponce</a></p>
            <p>Facebook: <a href="https://www.facebook.com/BandaUPRPonce">BandaUPRPonce</a></p>
        </div>
    </div>
</footer>

</div>

</body>
</html>
