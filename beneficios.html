<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

    body {
        margin: 0;
    }

    /* ===== HEADER WITH LOGOS ===== */
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
    }

    header h1 {
        flex: 1;
        text-align: center;
        background-color: #ff0000;
        color: #000000;
        margin: 0;
        font-size: 50px;
    }

    h2{
        text-align: left;
        background-color: #000000;
        color: #ffffff;
        font-size: 30px;
        margin: 0;
        padding-left: 25px;
    }

    .nav-btn {
        display: inline-block;
        margin: 20px 75px;
        padding: 10px 30px;
        font-size: 18px;
        background-color: #ff0000;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .nav-btn:hover {
        background-color: #cc0000;
    }

    h3 { 
        padding-right: 105px;
        font-family: sans-serif;
        font-size: 90px; 
        
    } 
    li{
        padding-top: 30px;
        padding-right: 130px;
        margin-bottom: 15px;
    }

    ul{
       text-align: left;
        font-size: 20px;
        color: #000000;
        border-radius: 10px;
        max-width: 400px;
       
    }

    hr{
        margin: 0;
    }

    

    /* ===== LOGOS ===== */
    .logo {
        width: 100px;
        margin-right: 30px;
        margin-left: 30px;
    }

    /* ===== MAIN CONTENT ===== */
    .main-section {
        position: relative;
        padding: 60px 0;
    }

    /* RED BARS */
    .side-bar {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 80px;
        height: 250px;
        background-color: red;
    }

    .side-bar.left {
        left: 0;
    }

    .side-bar.right {
        right: 0;
    }

    /* CONTENT FIXED HERE */
    .content {
        display: flex;
        align-items: flex-start; /* 🔥 FIX: moves everything up */
        justify-content: center;
        gap: 40px;
    }

    .main-img { 
        margin-left: 100px;
        margin-top: 50px;
        width: 500px; 
        border-radius: 10px;
    }

    .rogelio{
        width: 100px;
        margin-top: 0px;
    }

    .footer-content {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px;
    }

    .text-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .section-title {
        font-size: 40px;
        margin-bottom: 5px;
        margin-top: 0px;
    }

    .social {
        display: flex;
        gap: 40px;
    }

    .social p {
        margin-top: 0;
    }

    .social a {
        color: black;
        text-decoration: none;
    }
    .black-bar {
    background-color: black;
    height: 40px;
    width: 100%;
}

    </style>
    <title>Banda UPR Ponce</title>
</head>

<main>

                <h3 class="section-title">Beneficios</h3>

               
                    <ul>

                    </ul>
            
            </div>

<footer class="footer">

        <img src="images/rogelio.png" alt="rogelio" class="rogelio">

        <div class="social">
            <p>Instagram: <a href="https://www.instagram.com/banda_uprponce/">banda_uprponce</a></p> 
            <p>Facebook: <a href="https://www.facebook.com/BandaUPRPonce">BandaUPRPonce</a></p>
